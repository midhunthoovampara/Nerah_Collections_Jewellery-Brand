<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Collections | Nerah Collections</title>
    <meta name="description"
        content="Explore all jewelry collections from Nerah - Necklaces, Earrings, Bracelets, and more.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGold: '#D4AF37',
                        brandEmerald: '#004D40',
                        brandDark: '#1A1A1A',
                        brandBg: '#ffffff',

                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #2C2C2C;
        }

        .font-display {
            font-family: 'Cormorant Garamond', serif;
        }

        .category-btn.active {
            border-color: #D4AF37;
            color: #D4AF37;
        }

        .product-card {
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover {
            transform: translateY(-8px);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {

        }

        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
        }

        .logo-n {
            font-family: 'Bodoni Moda', serif;
            font-size: 2rem;
            color: #D4AF37;
            font-weight: 700;
            line-height: 1;
        }

        .logo-wordmark {
            font-family: 'Bodoni Moda', serif;
            color: #D4AF37;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .logo-collections {
            font-family: 'Lato', sans-serif;
            font-size: 0.5rem;
            letter-spacing: 0.4em;
            color: #004D40;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-top: 2px;
        }
    </style>
</head>

<body class="antialiased">

    <!-- Header (Consistent with Home) -->

        <div class="container mx-auto h-full px-4 md:px-6 flex justify-between items-center relative">
            <div class="flex items-center">
                <a href="../index.html" class="hover:text-brandGold transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="text-[10px] uppercase tracking-widest font-light hidden sm:inline">Back to Home</span>
                </a>
            </div>

            <div class="absolute left-1/2 -translate-x-1/2">
                <a href="../index.html" class="flex flex-col items-center">
                    <img src="../PHOTOS/nerahlogo.png" alt="Nerah logo"
                        class="h-16 sm:h-20 md:h-24 lg:h-28 w-auto object-contain transition-all duration-500">
                </a>
            </div>

            <div class="flex items-center space-x-6">
                <div class="cursor-pointer hover:text-brandGold transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"

    </header>



    <!-- Filter Section -->
    <section class="sticky top-20 bg-white/95 backdrop-blur-sm z-40 border-b border-gray-100 py-4 md:py-6">
        <div class="container mx-auto px-4 sm:px-6">
            <div class="flex flex-wrap justify-center gap-3 md:gap-8 overflow-x-auto pb-3 md:pb-0 scrollbar-hide">
                <button onclick="filterCategory('all')"
                    class="category-btn active px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">All
                    pieces</button>
                <button onclick="filterCategory('necklaces')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Necklaces</button>
                <button onclick="filterCategory('earrings')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Earrings</button>
                <button onclick="filterCategory('bracelets')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Bracelets</button>
                <button onclick="filterCategory('rings')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Rings</button>
                <button onclick="filterCategory('anti turnish')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Anti
                    Turnish</button>
                <button onclick="filterCategory('anklets')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Anklets</button>
                <button onclick="filterCategory('sets')"
                    class="category-btn px-4 sm:px-6 py-2 border-b-2 border-transparent text-[10px] sm:text-[11px] uppercase tracking-[0.2em] transition-all hover:text-brandGold">Jewelry
                    Sets</button>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="py-12 md:py-16">
        <div class="container mx-auto px-4 sm:px-6">
            <div id="product-grid" class="grid grid-cols-3 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-6 lg:gap-12">
                <!-- Products will be injected here via JS -->
            </div>
        </div>
    </section>

    <!-- Simple Minimal Footer (Consistent with design) -->
    <footer class="bg-[#1a1a1a] pt-[40px] pb-[30px] px-6">
        <div class="container mx-auto flex flex-col items-center">
            <ul
                class="flex flex-col md:flex-row items-center font-body text-[10px] md:text-[11px] text-[#D4AF37] tracking-widest uppercase space-y-3 md:space-y-0 mb-5">
                <li><a href="../index.html#collections" class="hover:brightness-125 transition-all">Collections</a></li>
                <li class="hidden md:block mx-3 text-[#D4AF37] opacity-60">•</li>
                <li><a href="#" class="hover:brightness-125 transition-all">Signature Pieces</a></li>
                <li class="hidden md:block mx-3 text-[#D4AF37] opacity-60">•</li>
                <li><a href="#" class="hover:brightness-125 transition-all">Our Story</a></li>
                <li class="hidden md:block mx-3 text-[#D4AF37] opacity-60">•</li>
                <li><a href="#" class="hover:brightness-125 transition-all">Contact Us</a></li>
            </ul>
            <div class="flex items-center space-x-6 mb-5 text-[#D4AF37]">
                <a href="#" class="hover:brightness-125 transition-all"><svg class="w-5 h-5" fill="none"
                        stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg></a>
                <a href="#" class="hover:brightness-125 transition-all"><svg class="w-5 h-5" fill="none"
                        stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path
                            d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z">
                        </path>
                    </svg></a>
            </div>
            <div class="text-[9px] md:text-[10px] text-[#888888] font-body text-center tracking-wide">
                &copy; 2024 Nerah Collections. Crafted with love.
            </div>
        </div>
    </footer>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/919072990460" target="_blank" class="fixed bottom-6 right-6 z-[100] group flex items-center">
        <div
            class="bg-[#25D366] text-white p-4 rounded-full shadow-2xl transition-transform duration-300 group-hover:scale-110">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
            </svg>
        </div>
    </a>

    <script type="module">
        import AirtableService from '../js/airtable.js';

        let products = [];

        async function initProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '<div class="col-span-full py-20 text-center text-gray-300 tracking-[0.2em] uppercase text-sm animate-pulse">Consulting the atelier...</div>';

            const data = await AirtableService.getAllProducts();
            if (data) {
                products = data;
                const params = new URLSearchParams(window.location.search);
                const cat = params.get('category');

                if (cat) {
                    filterCategory(cat);
                } else {
                    renderProducts('all');
                }
            } else {
                grid.innerHTML = '<p class="col-span-full py-20 text-center text-gray-400 tracking-widest uppercase text-xs">Our vault is temporarily closed. Please try again soon.</p>';
            }
        }

        function normalizeCategory(value) {
            return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
        }

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            const normalizedFilter = normalizeCategory(filter);
            const filtered = normalizedFilter === 'all'
                ? products
                : products.filter(p => normalizeCategory(p.category) === normalizedFilter);

            if (filtered.length === 0) {
                grid.innerHTML = '<p class="col-span-full py-20 text-center text-gray-400 tracking-widest uppercase text-xs">No pieces found in this category.</p>';
                return;
            }

            filtered.forEach(p => {
                grid.innerHTML += `
                    <a href="product-detail.html?id=${p.slug || p.id}" class="product-card group bg-white border border-gray-100 overflow-hidden block">
                        <div class="aspect-square overflow-hidden bg-gray-50">
                            <img src="${p.mainImage}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        </div>
                        <div class="p-3 sm:p-6 text-center">
                            <p class="text-[8px] sm:text-[9px] uppercase tracking-widest text-[#D4AF37] mb-1 sm:mb-2 font-bold">${p.category}</p>
                            <h3 class="font-display text-[11px] sm:text-xl leading-tight mb-1 sm:mb-3">${p.name}</h3>
                            <p class="text-[9px] sm:text-xs text-gray-500 tracking-widest font-bold">${p.price}</p>
                        </div>
                    </a>
                `;
            });
        }

        window.filterCategory = function (cat) {
            // Update buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active', 'border-brandGold');
                btn.classList.add('border-transparent');

                // Active state check
                const btnText = normalizeCategory(btn.innerText);
                const filterCat = normalizeCategory(cat);
                if (btnText === filterCat || (filterCat === 'all' && btnText === 'all')) {
                    btn.classList.add('active', 'border-brandGold');
                    btn.classList.remove('border-transparent');
                }
            });

            renderProducts(cat);
        };

        initProducts();
    </script>
</body>

</html>
